<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const W = cv.width, H = cv.height;

const m = 2, ax = 3, ay = 1, vx0 = 1, vy0 = -1;
const T_END = 3.0;

// Kinematic functions
function pos(t) { return { x: vx0*t + 0.5*ax*t*t, y: vy0*t + 0.5*ay*t*t }; }
function vel(t) { return { x: vx0 + ax*t, y: vy0 + ay*t }; }

// Scale logic: Calculate bounds based on the full 3s trajectory
const pts = [];
for (let i = 0; i <= 100; i++) { pts.push(pos((i/100) * T_END)); }
const xs = pts.map(p => p.x), ys = pts.map(p => p.y);
const xMin = Math.min(...xs, 0) - 2, xMax = Math.max(...xs) + 2;
const yMin = Math.min(...ys, 0) - 2, yMax = Math.max(...ys) + 2;

const pad = 50;
const scaleX = (W - 2 * pad) / (xMax - xMin);
const scaleY = (H - 2 * pad) / (yMax - yMin);
const scale = Math.min(scaleX, scaleY);

// Origin mapping
const cx0 = pad - xMin * scale;
const cy0 = H - pad + yMin * scale;

function toCV(px, py) { return { x: cx0 + px * scale, y: cy0 - py * scale }; }

let t = 0, running = false, raf = null, lastTime = null;

function drawGrid() {
  ctx.strokeStyle = '#1a1a2e';
  ctx.lineWidth = 1;
  for (let gx = Math.floor(xMin); gx <= Math.ceil(xMax); gx++) {
    const p = toCV(gx, 0);
    ctx.beginPath(); ctx.moveTo(p.x, 0); ctx.lineTo(p.x, H); ctx.stroke();
  }
  for (let gy = Math.floor(yMin); gy <= Math.ceil(yMax); gy++) {
    const p = toCV(0, gy);
    ctx.beginPath(); ctx.moveTo(0, p.y); ctx.lineTo(W, p.y); ctx.stroke();
  }
  
  // Axes
  ctx.strokeStyle = '#2a2a4a';
  ctx.lineWidth = 2;
  const orig = toCV(0, 0);
  ctx.beginPath(); ctx.moveTo(0, orig.y); ctx.lineTo(W, orig.y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(orig.x, 0); ctx.lineTo(orig.x, H); ctx.stroke();
}

function drawArrow(x1, y1, x2, y2, color, label) {
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len < 5) return;
  ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  const ang = Math.atan2(dy, dx);
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - 8 * Math.cos(ang - 0.4), y2 - 8 * Math.sin(ang - 0.4));
  ctx.lineTo(x2 - 8 * Math.cos(ang + 0.4), y2 - 8 * Math.sin(ang + 0.4));
  ctx.fill();
  if (label) {
    ctx.font = 'bold 12px Courier New';
    ctx.fillText(label, x2 + 5, y2 - 5);
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawGrid();

  // Full path (ghost)
  ctx.strokeStyle = '#1e3555'; ctx.lineWidth = 1; ctx.setLineDash([5, 5]);
  ctx.beginPath();
  pts.forEach((p, i) => {
    const c = toCV(p.x, p.y);
    i === 0 ? ctx.moveTo(c.x, c.y) : ctx.lineTo(c.x, c.y);
  });
  ctx.stroke(); ctx.setLineDash([]);

  // Active Trail
  ctx.strokeStyle = '#44aaff'; ctx.lineWidth = 3;
  ctx.beginPath();
  for (let i = 0; i <= t * 100 / T_END; i++) {
    const p = pos((i / 100) * T_END);
    const c = toCV(p.x, p.y);
    i === 0 ? ctx.moveTo(c.x, c.y) : ctx.lineTo(c.x, c.y);
  }
  ctx.stroke();

  const p = pos(t), v = vel(t);
  const cp = toCV(p.x, p.y);

  // Vectors
  drawArrow(cp.x, cp.y, cp.x + 40, cp.y - 13.3, '#ff6644', 'F'); // Force (Fixed dir)
  drawArrow(cp.x, cp.y, cp.x + v.x * 10, cp.y - v.y * 10, '#55dd55', 'v'); // Velocity

  // Body
  ctx.fillStyle = '#ffcc44';
  ctx.beginPath(); ctx.arc(cp.x, cp.y, 8, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

  // Panel Updates
  const ke = 0.5 * m * (v.x * v.x + v.y * v.y);
  const ke0 = 0.5 * m * (vx0 * vx0 + vy0 * vy0);
  document.getElementById('tVal').textContent = t.toFixed(3) + ' s';
  document.getElementById('xVal').textContent = p.x.toFixed(3) + ' m';
  document.getElementById('yVal').textContent = p.y.toFixed(3) + ' m';
  document.getElementById('vxVal').textContent = v.x.toFixed(3) + ' m/s';
  document.getElementById('vyVal').textContent = v.y.toFixed(3) + ' m/s';
  document.getElementById('spVal').textContent = Math.sqrt(v.x*v.x + v.y*v.y).toFixed(3) + ' m/s';
  document.getElementById('keVal').textContent = ke.toFixed(3) + ' J';
  document.getElementById('wVal').textContent = (ke - ke0).toFixed(3) + ' J';
}

function animate(ts) {
  if (!lastTime) lastTime = ts;
  const dt = (ts - lastTime) / 1000;
  lastTime = ts;

  if (running) {
    t += dt;
    if (t >= T_END) {
      t = T_END;
      running = false;
      document.getElementById('btnPlay').textContent = '▶ PLAY';
    }
    draw();
    raf = requestAnimationFrame(animate);
  }
}

document.getElementById('btnPlay').addEventListener('click', () => {
  if (t >= T_END) t = 0;
  running = !running;
  document.getElementById('btnPlay').textContent = running ? '⏸ PAUSE' : '▶ PLAY';
  if (running) {
    lastTime = performance.now();
    raf = requestAnimationFrame(animate);
  }
});

document.getElementById('btnReset').addEventListener('click', () => {
  running = false;
  t = 0;
  lastTime = null;
  cancelAnimationFrame(raf);
  document.getElementById('btnPlay').textContent = '▶ PLAY';
  draw();
});

draw(); // Initial state
</script>
