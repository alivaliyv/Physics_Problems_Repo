<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gauss's Law Numerical Verification</title>
    <style>
        body { margin: 0; background: #0a0a0c; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; }
        #container { position: relative; width: 70%; height: 100vh; }
        #sidebar { width: 30%; background: #16161a; padding: 25px; border-left: 1px solid #333; box-shadow: -5px 0 15px rgba(0,0,0,0.5); z-index: 10; }
        canvas { display: block; width: 100%; height: 100%; }
        h2 { color: #4af; margin-top: 0; }
        .stat-box { background: #24242b; padding: 15px; border-radius: 8px; margin: 15px 0; border: 1px solid #444; }
        .val { font-family: 'Courier New', monospace; color: #0f0; font-weight: bold; font-size: 1.2em; }
        input[type=range] { width: 100%; cursor: pointer; }
        .label-group { display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.9em; color: #aaa; }
    </style>
</head>
<body>

<div id="container">
    <canvas id="fluxCanvas"></canvas>
</div>

<div id="sidebar">
    <h2>Flux Integrator</h2>
    <p>Verifying $\oint \vec{E} \cdot d\vec{A} = Q/\epsilon_0$ via discrete surface sampling.</p>
    
    <div class="stat-box">
        <label>Enclosed Charge ($Q$):</label>
        <input type="range" id="qSlider" min="-20" max="20" value="10">
        <div class="label-group"><span>-20μC</span><span id="qDisplay">10μC</span><span>20μC</span></div>
    </div>

    <div class="stat-box">
        <label>Sampling Density ($N$):</label>
        <input type="range" id="nSlider" min="10" max="1000" value="100">
        <div class="label-group"><span>Low (Fast)</span><span id="nDisplay">100 points</span><span>High (Precise)</span></div>
    </div>

    <div class="stat-box">
        <div>Numerical Flux ($\sum E \cdot \Delta A$):</div>
        <div class="val" id="numFlux">0.00</div>
        <div style="margin-top:10px;">Theoretical Flux ($Q/\epsilon_0$):</div>
        <div class="val" id="theoFlux">0.00</div>
        <div style="margin-top:10px;">Numerical Error:</div>
        <div class="val" id="error">0.00%</div>
    </div>
</div>

<script>
const canvas = document.getElementById('fluxCanvas');
const ctx = canvas.getContext('2d');
const qSlider = document.getElementById('qSlider');
const nSlider = document.getElementById('nSlider');

const EPS_0 = 8.854; // Normalized for visualization
const K = 1 / (4 * Math.PI * EPS_0);

let rotation = 0;

function resize() {
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
}
window.addEventListener('resize', resize);
resize();

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    const Q = parseFloat(qSlider.value);
    const N = parseInt(nSlider.value);
    const R = 150;
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;

    document.getElementById('qDisplay').innerText = Q + "μC";
    document.getElementById('nDisplay').innerText = N + " points";

    let numericalFlux = 0;
    rotation += 0.005;

    // Numerical Integration across a sphere using Fibonacci lattice for uniform distribution
    const phi = Math.PI * (3 - Math.sqrt(5)); // Golden angle

    for (let i = 0; i < N; i++) {
        const y = 1 - (i / (N - 1)) * 2; // y goes from 1 to -1
        const radiusAtY = Math.sqrt(1 - y * y);
        const theta = phi * i + rotation;

        const x = Math.cos(theta) * radiusAtY;
        const z = Math.sin(theta) * radiusAtY;

        // Projection to 2D
        const projX = centerX + x * R;
        const projY = centerY + y * R;
        const size = (z + 1.5) * 2; // Depth cueing

        // Calculate local E-field magnitude
        const E_mag = K * Q / (R * R); 
        const deltaA = (4 * Math.PI * R * R) / N;
        
        // E and dA are parallel, so E dot dA = E * dA
        numericalFlux += E_mag * deltaA;

        // Draw surface elements
        ctx.beginPath();
        ctx.arc(projX, projY, size, 0, Math.PI * 2);
        ctx.fillStyle = Q >= 0 ? `rgba(255, 100, 100, ${z + 1})` : `rgba(100, 100, 255, ${z + 1})`;
        ctx.fill();

        // Draw local Normal/Field vectors
        if (i % Math.max(1, Math.floor(N/20)) === 0) {
            ctx.beginPath();
            ctx.moveTo(projX, projY);
            const vecLen = Q * 5;
            ctx.lineTo(projX + x * vecLen, projY + y * vecLen);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.stroke();
        }
    }

    // Draw central charge
    ctx.beginPath();
    ctx.arc(centerX, centerY, 12, 0, Math.PI * 2);
    ctx.fillStyle = Q >= 0 ? '#f00' : '#00f';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.stroke();

    // Update UI
    const theoreticalFlux = Q / EPS_0;
    const errorPct = Math.abs((numericalFlux - theoreticalFlux) / theoreticalFlux) * 100;

    document.getElementById('numFlux').innerText = numericalFlux.toFixed(4);
    document.getElementById('theoFlux').innerText = theoreticalFlux.toFixed(4);
    document.getElementById('error').innerText = Q === 0 ? "0.00%" : errorPct.toFixed(4) + "%";

    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
