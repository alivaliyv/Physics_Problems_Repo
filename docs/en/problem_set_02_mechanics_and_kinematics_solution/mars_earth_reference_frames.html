<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mars-Earth Reference Frames</title>
<style>body{font-family:Arial,sans-serif;background:#f6f7fb;margin:0;color:#222}.wrap{max-width:1280px;margin:20px auto;padding:0 16px}.controls,.panel{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.08);padding:14px}.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:16px 0}canvas{width:100%;display:block;height:auto}button{padding:8px 12px;border:0;border-radius:10px;background:#1f6feb;color:#fff;cursor:pointer}</style></head><body><div class="wrap"><h1>Heliocentric and Geocentric Description</h1><p>Two-panel animation: Earth and Mars around the Sun, and Mars as seen from Earth.</p><div class="controls"><label>Earth radius R<sub>E</sub> = <span id="reVal"></span><input id="RE" type="range" min="80" max="180" value="120"></label><label>Mars radius R<sub>M</sub> = <span id="rmVal"></span><input id="RM" type="range" min="140" max="260" value="190"></label><label>ω<sub>E</sub> = <span id="weVal"></span><input id="WE" type="range" min="0.5" max="2.0" step="0.05" value="1.0"></label><label>ω<sub>M</sub> = <span id="wmVal"></span><input id="WM" type="range" min="0.2" max="1.5" step="0.05" value="0.53"></label><div><button id="toggle">Pause</button><button id="reset">Reset trace</button></div><div id="info"></div></div><div class="panel"><canvas id="cv" width="1240" height="620"></canvas></div></div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');let t=0,last=0,run=true,trace=[];function upd(){reVal.textContent=RE.value;rmVal.textContent=RM.value;weVal.textContent=(+WE.value).toFixed(2);wmVal.textContent=(+WM.value).toFixed(2)}[RE,RM,WE,WM].forEach(e=>e.addEventListener('input',()=>{upd();trace=[];t=0;}));toggle.onclick=()=>{run=!run;toggle.textContent=run?'Pause':'Play';};reset.onclick=()=>{trace=[];};upd();
function panel(x0,y0,w,h,title){ctx.save();ctx.translate(x0,y0);ctx.strokeStyle='#ddd';ctx.strokeRect(0,0,w,h);ctx.fillStyle='#222';ctx.font='16px Arial';ctx.fillText(title,12,22);return {cx:w/2,cy:h/2,w,h};}
function draw(){ctx.clearRect(0,0,cv.width,cv.height);const left=panel(10,10,600,600,'A. Heliocentric frame (Sun at center)');const right=panel(630,10,600,600,'B. Geocentric frame (Mars relative to Earth)');
const REv=+RE.value, RMv=+RM.value, WEv=+WE.value, WMv=+WM.value;
const e={x:REv*Math.cos(WEv*t), y:REv*Math.sin(WEv*t)}; const m={x:RMv*Math.cos(WMv*t), y:RMv*Math.sin(WMv*t)}; const rel={x:m.x-e.x,y:m.y-e.y}; trace.push({...rel}); if(trace.length>1200) trace.shift();
ctx.save(); ctx.translate(10,10); ctx.strokeStyle='#bbb'; ctx.beginPath(); ctx.arc(left.cx,left.cy,REv,0,Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.arc(left.cx,left.cy,RMv,0,Math.PI*2); ctx.stroke(); ctx.fillStyle='#f4b400'; ctx.beginPath(); ctx.arc(left.cx,left.cy,10,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#1f6feb'; ctx.beginPath(); ctx.arc(left.cx+e.x,left.cy-e.y,8,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#e55353'; ctx.beginPath(); ctx.arc(left.cx+m.x,left.cy-m.y,8,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#222'; ctx.fillText('Sun',left.cx+14,left.cy-10); ctx.fillText('Earth',left.cx+e.x+10,left.cy-e.y-10); ctx.fillText('Mars',left.cx+m.x+10,left.cy-m.y-10); ctx.restore();
ctx.save(); ctx.translate(630,10); ctx.strokeStyle='#999'; ctx.beginPath(); ctx.moveTo(right.cx,30); ctx.lineTo(right.cx,570); ctx.moveTo(30,right.cy); ctx.lineTo(570,right.cy); ctx.stroke(); ctx.strokeStyle='#d63384'; ctx.lineWidth=2.2; ctx.beginPath(); trace.forEach((p,i)=>{const x=right.cx+p.x,y=right.cy-p.y; i?ctx.lineTo(x,y):ctx.moveTo(x,y);}); ctx.stroke(); ctx.fillStyle='#1f6feb'; ctx.beginPath(); ctx.arc(right.cx,right.cy,8,0,Math.PI*2); ctx.fill(); ctx.fillText('Earth',right.cx+10,right.cy-10); ctx.fillStyle='#e55353'; ctx.beginPath(); ctx.arc(right.cx+rel.x,right.cy-rel.y,8,0,Math.PI*2); ctx.fill(); ctx.fillText('Mars',right.cx+rel.x+10,right.cy-rel.y-10); ctx.restore();
info.innerHTML=`In the geocentric frame: x<sub>M/E</sub>(t)=R<sub>M</sub>cos(ω<sub>M</sub>t)-R<sub>E</sub>cos(ω<sub>E</sub>t), y<sub>M/E</sub>(t)=R<sub>M</sub>sin(ω<sub>M</sub>t)-R<sub>E</sub>sin(ω<sub>E</sub>t). t = ${t.toFixed(2)} s`;
}
function anim(ts){if(!last)last=ts;const dt=(ts-last)/1000;last=ts;if(run){t+=dt*0.7;}draw();requestAnimationFrame(anim);}requestAnimationFrame(anim);
</script></body></html>
