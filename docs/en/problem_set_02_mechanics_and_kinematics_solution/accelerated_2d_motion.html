<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>2D Accelerated Motion</title>
<style>body{font-family:Arial,sans-serif;background:#f6f7fb;margin:0;color:#222}.wrap{max-width:1100px;margin:20px auto;padding:0 16px}.controls,.panel{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.08);padding:14px}.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:16px 0}canvas{width:100%;display:block;height:auto}button{padding:8px 12px;border:0;border-radius:10px;background:#1f6feb;color:white;cursor:pointer}</style></head><body><div class="wrap"><h1>2D Motion with Constant Acceleration</h1><p>Default values follow the problem: <b>a = (2,-3)</b>, <b>v(0) = (1,0)</b>, <b>r(0) = (0,0)</b>.</p><div class="controls"><label>a<sub>x</sub> = <span id="axVal"></span><input id="ax" type="range" min="-5" max="5" step="0.1" value="2"></label><label>a<sub>y</sub> = <span id="ayVal"></span><input id="ay" type="range" min="-5" max="5" step="0.1" value="-3"></label><label>v<sub>x0</sub> = <span id="vxVal"></span><input id="vx0" type="range" min="-5" max="5" step="0.1" value="1"></label><label>v<sub>y0</sub> = <span id="vyVal"></span><input id="vy0" type="range" min="-5" max="5" step="0.1" value="0"></label><div><button id="toggle">Pause</button><button id="reset">Reset</button></div><div id="info"></div></div><div class="panel"><canvas id="cv" width="1000" height="600"></canvas></div></div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');let t=0,last=0,run=true,trace=[];function U(){axVal.textContent=ax.value;ayVal.textContent=ay.value;vxVal.textContent=vx0.value;vyVal.textContent=vy0.value;}[ax,ay,vx0,vy0].forEach(e=>e.addEventListener('input',()=>{U();trace=[];t=0;}));toggle.onclick=()=>{run=!run;toggle.textContent=run?'Pause':'Play';};reset.onclick=()=>{t=0;trace=[];};U();
function arrow(x1,y1,x2,y2,c,l){ctx.strokeStyle=c;ctx.fillStyle=c;ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();const a=Math.atan2(y2-y1,x2-x1),h=8;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-h*Math.cos(a-Math.PI/6),y2-h*Math.sin(a-Math.PI/6));ctx.lineTo(x2-h*Math.cos(a+Math.PI/6),y2-h*Math.sin(a+Math.PI/6));ctx.closePath();ctx.fill();ctx.fillText(l,x2+6,y2+6)}
function draw(){ctx.clearRect(0,0,cv.width,cv.height);const ox=80,oy=520,s=18,AX=+ax.value,AY=+ay.value,VX0=+vx0.value,VY0=+vy0.value;ctx.strokeStyle='#777';ctx.beginPath();ctx.moveTo(30,oy);ctx.lineTo(cv.width-30,oy);ctx.moveTo(ox,30);ctx.lineTo(ox,cv.height-30);ctx.stroke();ctx.fillStyle='#444';ctx.fillText('x',cv.width-24,oy-8);ctx.fillText('y',ox+8,38);
const x=VX0*t+0.5*AX*t*t, y=VY0*t+0.5*AY*t*t, vx=VX0+AX*t, vy=VY0+AY*t; trace.push([x,y]); if(trace.length>500) trace.shift();
ctx.strokeStyle='#1f6feb';ctx.lineWidth=2.5;ctx.beginPath();trace.forEach((p,i)=>{const sx=ox+p[0]*s, sy=oy-p[1]*s; i?ctx.lineTo(sx,sy):ctx.moveTo(sx,sy);});ctx.stroke();
const sx=ox+x*s, sy=oy-y*s; ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(sx,sy,7,0,Math.PI*2); ctx.fill(); arrow(sx,sy,sx+vx*s*0.8,sy-vy*s*0.8,'#159957','v'); arrow(sx,sy,sx+AX*s*2.2,sy-AY*s*2.2,'#e55353','a');
ctx.fillStyle='#111'; ctx.fillText(`r(t)=(${x.toFixed(2)}, ${y.toFixed(2)})`,690,50); ctx.fillText(`v(t)=(${vx.toFixed(2)}, ${vy.toFixed(2)})`,690,74); ctx.fillText(`a=(${AX.toFixed(2)}, ${AY.toFixed(2)})`,690,98); ctx.fillText(`t=${t.toFixed(2)} s`,690,122);
info.innerHTML=`Trajectory from r(t)=r₀+v₀t+(1/2)at² and v(t)=v₀+at.`;
}
function anim(ts){if(!last)last=ts;const dt=(ts-last)/1000;last=ts;if(run){t+=dt*0.8;if(t>10){t=0;trace=[];}}draw();requestAnimationFrame(anim);}requestAnimationFrame(anim);
</script></body></html>
