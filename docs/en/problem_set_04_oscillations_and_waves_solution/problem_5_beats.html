<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Beats</title>
</head>
<body>
<canvas id="c" width="800" height="400"></canvas>
<script>
let canvas = document.getElementById("c");
let ctx = canvas.getContext("2d");

let A = 1;
let k = 2;
let w = 10;
let dw = 1;

let t = 0;

function draw() {
    ctx.clearRect(0,0,800,400);

    ctx.beginPath();
    for(let x=0;x<800;x++){
        let X = x/100;
        let y1 = A*Math.sin(k*X - w*t);
        let y2 = A*Math.sin(k*X - (w+dw)*t);
        let y = y1 + y2;
        ctx.lineTo(x,200 + y*50);
    }
    ctx.stroke();

    t += 0.02;
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
