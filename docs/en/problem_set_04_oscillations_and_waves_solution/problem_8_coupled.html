<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Coupled Masses</title>
</head>
<body>
<canvas id="c" width="800" height="300"></canvas>
<script>
let ctx = document.getElementById("c").getContext("2d");

let x1=1,x2=0,v1=0,v2=0;
let k=10,m=1;

function step(){
    let dt=0.02;
    let a1 = (-2*k*x1 + k*x2)/m;
    let a2 = (-2*k*x2 + k*x1)/m;

    v1+=a1*dt;
    v2+=a2*dt;
    x1+=v1*dt;
    x2+=v2*dt;
}

function draw(){
    ctx.clearRect(0,0,800,300);
    step();

    ctx.beginPath();
    ctx.arc(300 + x1*100,150,10,0,2*Math.PI);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(500 + x2*100,150,10,0,2*Math.PI);
    ctx.fill();

    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
