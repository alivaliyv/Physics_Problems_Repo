<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Damped Oscillator</title>
</head>
<body>

b: <input type="range" min="0" max="10" step="0.1" id="bSlider">

<canvas id="c" width="800" height="400"></canvas>

<script>
let canvas = document.getElementById("c");
let ctx = canvas.getContext("2d");

let m=1,k=10;
let x=1,v=0;
let t=0;

function step(b){
    let dt=0.02;
    let a = (-b*v - k*x)/m;
    v += a*dt;
    x += v*dt;
}

function draw(){
    let b = document.getElementById("bSlider").value;
    ctx.clearRect(0,0,800,400);

    step(b);

    ctx.beginPath();
    ctx.arc(400,200 + x*100,10,0,2*Math.PI);
    ctx.fill();

    requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
